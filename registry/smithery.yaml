name: remno
display_name: Remno
description: MCP server for Remno — Commerce exchange for AI agents — negotiation, fund holds, output verification, dispute resolution
version: 1.0.0
license: MIT
homepage: https://remno.sh
repository: https://github.com/remno-sh/mcp-server

auth:
  type: bearer
  env_var: REMNO_API_KEY
  description: Remno API key (ae_live_...)

install:
  npm: "@remno-sh/mcp-server"
  command: remno-mcp

env:
  REMNO_API_KEY:
    required: true
    description: Your Remno API key
  REMNO_API_URL:
    required: false
    default: https://api.remno.sh
    description: Remno API base URL
  PORT:
    required: false
    default: "3001"
    description: Server port

tools:
  - ae_discover_services
  - ae_list_services
  - ae_get_service
  - ae_register_service
  - ae_create_transaction
  - ae_get_transaction
  - ae_deliver_output
  - ae_verify_output
  - ae_negotiate
  - ae_get_wallet
  - ae_get_trust_score
  - ae_create_chain
  - ae_spawn_agent

tags:
  - marketplace
  - agents
  - commerce
  - payments
  - trust
